<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF3B30" />
      <stop offset="100%" stop-color="#C90000" />
    </linearGradient>
    
    <!-- Arrow Gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E8E8E8" />
    </linearGradient>

    <!-- Subtle Drop Shadow for the Arrow -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <!-- Mask to cut the Play button out of the Arrow -->
    <mask id="arrowMask">
      <rect width="512" height="512" fill="white" />
      <!-- The play triangle -->
      <path d="M236 160 L236 220 L286 190 Z" fill="black" stroke="black" stroke-width="12" stroke-linejoin="round" />
    </mask>
  </defs>

  <!-- App Squircle Base -->
  <rect x="40" y="40" width="432" height="432" rx="100" fill="url(#bgGrad)" />

  <!-- Arrow with Play Cutout -->
  <g filter="url(#dropShadow)">
    <path d="M256 370 L146 250 L212 250 L212 140 L300 140 L300 250 L366 250 Z" 
          fill="url(#arrowGrad)" 
          stroke="url(#arrowGrad)" 
          stroke-width="14" 
          stroke-linejoin="round" 
          mask="url(#arrowMask)"/>
  </g>
</svg>
