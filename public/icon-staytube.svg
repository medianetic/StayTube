<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient for the Circle -->
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E52D27" />
      <stop offset="100%" stop-color="#B31217" />
    </linearGradient>

    <!-- Drop Shadow for the Circle -->
    <filter id="circleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <!-- Inner Shadow for the 'S' cutout -->
    <filter id="innerShadow">
      <feOffset dx="0" dy="4" />
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite operator="out" in="SourceGraphic" in2="blur" result="inverse" />
      <feFlood flood-color="black" flood-opacity="0.4" result="color" />
      <feComposite operator="in" in="color" in2="inverse" result="shadow" />
      <feComposite operator="over" in="shadow" in2="SourceGraphic" />
    </filter>
  </defs>

  <!-- Red Circle Base -->
  <circle cx="256" cy="256" r="220" fill="url(#circleGrad)" filter="url(#circleShadow)" />

  <!-- The 'S' Shape (Stylized) -->
  <path d="M210 165 
           C 180 165, 160 185, 160 215 
           C 160 245, 180 260, 220 275 
           L 290 300 
           C 330 315, 350 330, 350 365 
           C 350 405, 320 425, 260 425 
           C 200 425, 170 405, 160 380 
           L 225 365 
           C 235 375, 245 380, 260 380 
           C 275 380, 285 375, 285 365 
           C 285 355, 275 345, 245 335 
           L 175 310 
           C 135 295, 115 275, 115 235 
           C 115 195, 145 165, 210 165 
           Z
           M 302 147 
           L 237 162 
           C 227 152, 217 147, 210 147 
           C 195 147, 185 152, 185 162 
           C 185 172, 195 182, 225 192 
           L 295 217 
           C 335 232, 355 252, 355 292 
           C 355 332, 325 362, 260 362 
           L 260 362
           L 302 147 Z" 
        fill="white" 
        style="display:none;" />

  <!-- Clean Bold 'S' Cutout -->
  <text x="256" y="360" 
        font-family="Arial, sans-serif" 
        font-weight="900" 
        font-size="320" 
        text-anchor="middle" 
        fill="white" 
        filter="url(#innerShadow)">S</text>
</svg>
